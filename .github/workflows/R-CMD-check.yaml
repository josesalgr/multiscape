name: R-CMD-check

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  schedule:
    - cron: "0 0 * * 1"

  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false

      matrix:
        config:
          - os: ubuntu-latest
            r: "devel"
            http-user-agent: "release"

          - os: ubuntu-latest
            r: "release"

          - os: ubuntu-latest
            r: "oldrel-1"

          - os: windows-latest
            r: "release"

          - os: macos-latest
            r: "release"

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false
      _R_CHECK_CRAN_INCOMING_REMOTE_: false
      _R_CHECK_TIMINGS_: 10
      _R_REMOTES_NO_ERRORS_FROM_WARNINGS_: true
      NOT_CRAN: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            pkg-config \
            coinor-cbc \
            coinor-libcbc-dev \
            coinor-libclp-dev \
            coinor-libsymphony-dev
        shell: bash

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::rcmdcheck
            any::sessioninfo
            any::testthat
            any::pak
            knitr
          needs: check

      - name: Install rcbc on Linux
        if: runner.os == 'Linux'
        run: |
          pak::pkg_install(
            "github::dirkschumacher/rcbc",
            upgrade = FALSE
          )
        shell: Rscript {0}

      - name: Verify CBC installation on Linux
        if: runner.os == 'Linux'
        run: |
          cat("CBC executable:\n")
          print(Sys.which("cbc"))

          if (!nzchar(Sys.which("cbc"))) {
            stop("CBC executable was not found.")
          }

          cat("\nrcbc package:\n")

          if (!requireNamespace("rcbc", quietly = TRUE)) {
            stop("The `rcbc` R package was not installed.")
          }

          print(packageVersion("rcbc"))
          print(system.file(package = "rcbc"))
        shell: Rscript {0}

      - name: Session information
        run: |
          options(width = 100)
          sessioninfo::session_info(include_base = TRUE)
        shell: Rscript {0}

      - name: Check
        run: |
          rcmdcheck::rcmdcheck(
            args = c(
              "--no-manual",
              "--as-cran",
              "--no-build-vignettes"
            ),
            error_on = "warning",
            check_dir = "check"
          )
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          find check \
            -name 'testthat.Rout*' \
            -exec cat '{}' \; || true
        shell: bash

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-R-${{ matrix.config.r }}-check-results
          path: check
