on:
  push:
    branches: [main, master]
  pull_request:

name: test-coverage

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install CBC system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coinor-cbc \
            coinor-libcbc-dev \
            coinor-libclp-dev
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::covr
            any::xml2
            any::rcmdcheck
            any::sessioninfo
            any::testthat
            knitr
            github::dirkschumacher/rcbc
          needs: check

      - name: Verify CBC installation
        run: |
          cat("CBC executable:\n")
          print(Sys.which("cbc"))

          if (!nzchar(Sys.which("cbc"))) {
            stop("The CBC executable is not available.")
          }

          cat("\nrcbc package:\n")
          if (!requireNamespace("rcbc", quietly = TRUE)) {
            stop("The `rcbc` R package is not available.")
          }

          print(packageVersion("rcbc"))
        shell: Rscript {0}

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(
              normalizePath(
                Sys.getenv("RUNNER_TEMP"),
                winslash = "/"
              ),
              "package"
            )
          )

          print(cov)

          covr::to_cobertura(
            cov,
            filename = "cobertura.xml"
          )
        shell: Rscript {0}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          use_pypi: true
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          find '${{ runner.temp }}/package' \
            -name 'testthat.Rout*' \
            -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
          if-no-files-found: warn
