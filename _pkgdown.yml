title: multiscape
url: https://josesalgr.github.io/multiscape/

template:
  bootstrap: 5
  math-rendering: mathjax
  logo: man/figures/logo.png
  bslib:
    bootswatch: flatly
  includes:
    in_header: |
      <link rel="stylesheet" href="extra.css">
  params:
    docsearch:
      api_key: f00985ff93067595b4da97a65fe69f1a
      index_name: multiscape
    ganalytics: G-6YB8F3838H

destination: docs

navbar:
  structure:
    left:
      - home
      - reference
      - articles
      - news
    right:
      - search
      - github
  components:
    github:
      icon: fa-github
      href: https://github.com/josesalgr/multiscape
      aria-label: GitHub repository

reference:

  - title: Build and solve problems
    desc: Core workflow to create a planning problem, configure it, and solve it.
    contents:
      - create_problem
      - solve

  - title: Actions, effects and profits
    desc: Define feasible actions, their effects, and optional profits.
    contents:
      - add_actions
      - add_effects
      - add_benefits
      - add_losses
      - add_profit

  - title: Constraints
    desc: Define target requirements, area limits, budgets, and locking constraints.
    contents:
      - add_constraint_targets_absolute
      - add_constraint_targets_relative
      - add_constraint_area
      - add_constraint_budget
      - add_constraint_locked_actions
      - add_constraint_locked_planning_units

  - title: Spatial relations
    desc: Register boundary and graph-based spatial relations from tables, polygons, or coordinates.
    contents:
      - add_spatial_relations
      - add_spatial_boundary
      - add_spatial_rook
      - add_spatial_queen
      - add_spatial_knn
      - add_spatial_distance

  - title: Atomic objectives
    desc: Register objectives that can be solved individually or combined in multi-objective workflows.
    contents:
      - add_objective_min_cost
      - add_objective_max_benefit
      - add_objective_min_loss
      - add_objective_max_profit
      - add_objective_max_net_profit
      - add_objective_min_fragmentation_planning_units
      - add_objective_min_fragmentation_action
      - add_objective_min_intervention_impact

  - title: Solver configuration
    desc: Store solver and runtime options before calling solve().
    contents:
      - set_solver
      - set_solver_gurobi
      - set_solver_cplex
      - set_solver_cbc
      - set_solver_symphony

  - title: Multi-objective methods
    desc: Configure weighted-sum, epsilon-constraint, and AUGMECON workflows.
    contents:
      - set_method_weighted_sum
      - set_method_epsilon_constraint
      - set_method_augmecon

  - title: Multi-objective run configuration
    desc: Define automatic or manual run designs and execution controls for multi-objective workflows.
    contents:
      - set_runs_grid
      - set_runs_manual
      - set_runs_control

  - title: Results and extraction
    desc: Extract run metadata, objective values, and solution-level results.
    contents:
      - get_runs
      - get_objectives
      - get_planning_units
      - get_actions
      - get_features
      - get_targets

  - title: Solution-set management
    desc: Filter, combine, and remove repeated solutions while preserving SolutionSet consistency.
    contents:
      - solution_filter
      - solution_append
      - solution_unique

  - title: Frontier analysis
    desc: Characterize objective ranges and distances to observed reference points.
    contents:
      - frontier_extremes
      - frontier_distances
      - frontier_knee

  - title: Selection analysis
    desc: Analyze the recurrence and structural similarity of planning-unit and action assignments.
    contents:
      - selection_frequency
      - selection_similarity

  - title: Plotting
    desc: Visualize spatial outputs and multi-objective trade-offs.
    contents:
      - plot_spatial_planning_units
      - plot_spatial_actions
      - plot_spatial_features
      - plot_tradeoff

  - title: Advanced functions
    desc: Advanced utilities for inspecting or compiling optimization models.
    contents:
      - compile_model

  - title: Classes
    desc: Public classes used across the package.
    contents:
      - problem-class
      - solutionset-class

  - title: Data
    desc: Simulated datasets distributed with the package.
    contents:
      - starts_with("sim_")
      - load_sim_features_raster

  - title: Deprecated functions
    desc: Deprecated functions kept for backwards compatibility.
    contents:
      - add_constraint_locked_pu
      - add_objective_min_fragmentation_pu
      - get_pu
      - plot_spatial_pu
      - run_grid
      - run_manual
      - mo_control
